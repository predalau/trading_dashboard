version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: investhor_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelab-bridge

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: investhor_backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@investhor_db:5432/${DB_NAME}
      DEBUG: ${DEBUG}
      API_VERSION: v1
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - homelab-bridge

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: investhor_frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - homelab-bridge

volumes:
  postgres_data:

networks:
  homelab-bridge:
    external: true
