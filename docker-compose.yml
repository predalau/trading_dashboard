version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading_dashboard_db
    environment:
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_password
      POSTGRES_DB: trading_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_dashboard_api
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://trading_user:trading_password@postgres:5432/trading_dashboard
      DEBUG: "true"
      API_VERSION: v1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - trading_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_dashboard_ui
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - trading_network

volumes:
  postgres_data:

networks:
  trading_network:
    driver: bridge
